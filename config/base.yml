# --- config/base.yml ---
adapter: qlora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

# Precision architecture tailored for modern compute architectures
bf16: true
fp16: false
tf32: true

dataset_prepared_path: last_run_prepared
val_set_size: 0

sequence_len: 16384 
sample_packing: false 
pad_to_sequence_len: false

# Memory boundaries optimized for large context execution
micro_batch_size: 1
gradient_accumulation_steps: 4

num_epochs: 3
optimizer: adamw_torch_fused # Maximizes execution speed when fitting natively in VRAM
lr_scheduler: cosine
learning_rate: 0.0002

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
