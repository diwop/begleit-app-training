base_model: unsloth/Mixtral-8x7B-Instruct-v0.1-bnb-4bit
load_in_4bit: true

adapter: qlora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

datasets:
  - path: data/axolotl_dataset.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: messages
    message_property_mappings:
      role: role
      content: content

dataset_prepared_path: last_run_prepared
val_set_size: 0
output_dir: /app/output

sequence_len: 1024
sample_packing: true
pad_to_sequence_len: true

# default: optimized for multiple 24GB VRAM cards
micro_batch_size: 1
gradient_accumulation_steps: 8

num_epochs: 1
optimizer: paged_adamw_8bit # reduces VRAM usage
lr_scheduler: cosine
learning_rate: 0.0002

train_on_inputs: false
group_by_length: false
bf16: auto
fp16: false
tf32: false

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

logging_steps: 1
flash_attention: true

warmup_steps: 10
evals_per_epoch: 0
saves_per_epoch: 1
weight_decay: 0.0
