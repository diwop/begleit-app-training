# --- train-gemma4.yml ---
base_model: google/gemma-4-26b-a4b-it
unsloth: false # Mandatory for multi-GPU training
load_in_8bit: true # VRAM is sufficient
load_in_4bit: false

# OVERRIDE: Tell Axolotl to use standard LoRA mapping layers 
# to allow compatibility with 8-bit base weight quantization.
adapter: lora

output_dir: /app/output/adapter/gemma4

datasets:
  - path: data/train/dataset.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: messages
    message_property_mappings:
      role: role
      content: content