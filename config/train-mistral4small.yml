# --- config/train-mistral4small.yml ---
base_model: axolotl-ai-co/Mistral-Small-4-119B-2603-BF16

adapter: qlora

load_in_8bit: false
load_in_4bit: true                      # Enable: Compresses the unquantized base down to 4-bit slots
qlora_sharded_model_loading: true       # Mandatory: Shards the 119B weights to fit 4x L40S layout

datasets:
  - path: data/train/dataset.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: messages
    message_property_mappings:
      role: role
      content: content