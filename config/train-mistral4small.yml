# --- train-mistral4small.yml ---
base_model: mistralai/Mistral-Small-4-119B-2603
unsloth: false
load_in_4bit: true

output_dir: /app/output/adapter/mistral4small

datasets:
  - path: data/train/dataset.jsonl
    type: chat_template
    field_messages: messages
    message_property_mappings:
      role: role
      content: content