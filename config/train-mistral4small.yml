# --- config/train-mistral4small.yml ---
base_model: axolotl-ai-co/Mistral-Small-4-119B-2603-FP8

adapter: lora
load_in_8bit: false
load_in_4bit: false
qlora_sharded_model_loading: false

datasets:
  - path: data/train/dataset.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: messages
    message_property_mappings:
      role: role
      content: content