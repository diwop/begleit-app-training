base_model: cyankiwi/Mistral-Small-4-119B-2603-AWQ-4bit
# Note: load_in_4bit is omitted because AWQ models are already explicitly formatted in 4-bit

adapter: qlora
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

datasets:
  - path: data/axolotl_dataset.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: messages
    message_property_mappings:
      role: role
      content: content

dataset_prepared_path: last_run_prepared
val_set_size: 0
output_dir: /app/output

sequence_len: 1024
sample_packing: true
pad_to_sequence_len: true

# default: optimized for multiple 24GB VRAM cards
micro_batch_size: 1
gradient_accumulation_steps: 8

num_epochs: 1
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 0.0002

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

flash_attention: true

deepspeed: config/zero3.json