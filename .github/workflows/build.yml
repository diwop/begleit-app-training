name: Build Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  #  Check for actual changes to the docker image
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docker_files: ${{ steps.filter.outputs.docker_files }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker_files:
              - 'runner/**'
              - 'Dockerfile'

  # Build and Push
  build-docker-image:
    needs: detect-changes
    # Run ONLY IF docker image changed or if the user manually triggered the workflow
    if: needs.detect-changes.outputs.docker_files == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max