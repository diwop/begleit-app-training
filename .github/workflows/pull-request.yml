name: Continuous Integration

on:
  pull_request:

jobs:
  check-dependabot:
    name: Check Dependabot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate dependabot.yml
        uses: marocchino/validate-dependabot@v3
        with:
          path: .github/dependabot.yml

  validate-data:
    name: Check if dataset was prepared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: iterative/setup-dvc@v2
      - name: Pull dataset from DVC
        run: dvc pull
      - name: Check if final dataset is up-to-date with raw data
        run: dvc status; dvc status -q # First for visibility, second to fail if invalid

  test-python:
    name: Test Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Run Pytest
        run: uv run pytest tests/

  # Detect if Dockerfile or the runner changed
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      docker_files: ${{ steps.filter.outputs.docker_files }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker_files:
              - 'runner/**'
              - 'Dockerfile'

  test-docker:
    name: Test Docker Build
    needs:
      - detect-changes
      - check-dependabot # docker build consumes so much time (avoid running if others failed)
      - validate-data
      - test-python
    # Only run this job if the filter detected changes in runner/ or Dockerfile
    if: needs.detect-changes.outputs.docker_files == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Free up GitHub runner disk space # otherwise the huge docker build fails
        run: |
          echo "Freeing up disk space"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af
      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max