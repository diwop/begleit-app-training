name: Continuous Integration

on:
  pull_request:

jobs:
  check-dependabot:
    name: Check Dependabot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate dependabot.yml
        uses: marocchino/validate-dependabot@v3
        with:
          path: .github/dependabot.yml

  test-python:
    name: Test Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Run Pytest
        run: uv run pytest tests/

  # Detect if Dockerfile or the runner changed
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      docker_files: ${{ steps.filter.outputs.docker_files }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker_files:
              - 'runner/**'
              - 'Dockerfile'

  test-docker:
    name: Test Docker Build
    needs: detect-changes
    # Only run this job if the filter detected changes in runner/ or Dockerfile
    if: needs.detect-changes.outputs.docker_files == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max