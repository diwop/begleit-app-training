[project]
name = "axolotl-moe-pipeline"
version = "0.1.0"
description = "Axolotl MoE fine-tuning pipeline"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "datasets>=2.16.0",
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
